# Supabase pauses free projects after 7 days of zero database activity.
# This pings the REST endpoint every 3 days so Airhyl never opens the
# site to a dead page. Set SUPABASE_URL and SUPABASE_ANON_KEY as repo
# secrets (Settings > Secrets and variables > Actions). The anon key is
# safe here — deny-all RLS means it can't actually read anything; the
# ping just counts as activity.
name: Keep Supabase alive

on:
  schedule:
    - cron: '0 8 */3 * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        run: |
          curl -s "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -o /dev/null
